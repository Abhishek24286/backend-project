<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Global Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container">
        <h2 id="auth-title">Login</h2>
        <form id="auth-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="auth-btn">Login</button>
        </form>
        <p id="toggle-p">Don't have an account? <span id="toggle-auth">Sign Up</span></p>
        <p id="error-msg" style="color: red; margin-top: 10px;"></p>
    </div>

    <div id="chat-container" style="display: none;">
        <h2 id="welcome-user">Global Chat</h2>
        
        <div id="messages"></div>
        
        <form id="chat-form">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
